services:
  git-cache-gateway:
    build: ..
    container_name: git-cache-gateway
    restart: unless-stopped
    environment:
      GITCACHE_GATEWAY_CONFIG: /etc/git-cache-gateway/config.toml
      GITCACHE_GITLAB_TOKEN: ${GITCACHE_GITLAB_TOKEN}
    volumes:
      - ./config.toml:/etc/git-cache-gateway/config.toml:ro
      - git_cache_gateway_cache:/var/cache/git-cache-gateway
      - git_cache_gateway_locks:/var/lock/git-cache-gateway
    ports:
      - "8080:8080"

volumes:
  git_cache_gateway_cache:
  git_cache_gateway_locks:
